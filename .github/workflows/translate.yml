name: translate

on:
  push:
    branches:
      - main
    paths:
      - 'static/i18n/en.js'
      - 'tools/i18n-ai-tool.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install openai json5
          npm ci

      - name: Translate missing keys
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          for lang in de es fr it jp cn nl pi pl we pt br cs sk kr fi; do
            python tools/i18n-ai-tool.py "$lang"
            npx prettier -w "static/i18n/${lang}.js"
          done

      - name: Commit translations
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/i18n
          git commit -m "Translate locales"
          git push
